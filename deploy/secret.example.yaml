apiVersion: v1
kind: Secret
metadata:
  name: agentops-secrets
  namespace: agentops
  labels:
    app.kubernetes.io/name: agentops
type: Opaque
stringData:
  SLACK_SIGNING_SECRET: "REPLACE_ME_slack_signing_secret"
  SLACK_BOT_TOKEN: "REPLACE_ME_xoxb-your-bot-token"
