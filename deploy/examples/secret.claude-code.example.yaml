# EXAMPLE ONLY — DO NOT COMMIT WITH REAL VALUES.
#
# Anthropic/Claude credentials for the claude-code agent harness, referenced by
# sandboxtemplate-claude-code.yaml. These are template-level (shared) harness
# credentials — distinct from the per-user MCP OAuth tokens the app brokers.
#
# Copy this file, fill in your real key, and apply it out-of-band. Keep real
# secrets out of version control (use a secrets manager, sealed-secrets, SOPS).
apiVersion: v1
kind: Secret
metadata:
  name: claude-code-credentials
  namespace: agentops
  labels:
    app.kubernetes.io/name: agentops
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "REPLACE_ME_sk-ant-..."
