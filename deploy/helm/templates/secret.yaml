{{- if not .Values.existingSecret.name }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentops.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentops.labels" . | nindent 4 }}
type: Opaque
stringData:
  SLACK_SIGNING_SECRET: {{ required "slack.signingSecret is required when existingSecret.name is unset" .Values.slack.signingSecret | quote }}
  SLACK_BOT_TOKEN: {{ required "slack.botToken is required when existingSecret.name is unset" .Values.slack.botToken | quote }}
{{- end }}
