apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "agentops.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentops.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- if .Values.rbac.create }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "agentops.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentops.labels" . | nindent 4 }}
rules:
  - apiGroups: ["agents.pomerium.com"]
    resources: ["agenttemplates"]
    verbs: ["get", "list", "watch"]
  # NOTE: no "secrets" access — by design. Git credentials reach the sandbox
  # via secretKeyRef in the SandboxTemplate (resolved by the kubelet), and MCP
  # tokens/LLM keys go through the sandbox sidecar; the app itself never reads
  # Kubernetes Secrets.
  - apiGroups: ["extensions.agents.x-k8s.io"]
    resources: ["sandboxtemplates"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions.agents.x-k8s.io"]
    resources: ["sandboxclaims"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["sandboxes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "agentops.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentops.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "agentops.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "agentops.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
