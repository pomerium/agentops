name: Test
permissions:
  contents: read
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: .tool-versions

      - name: Vet
        run: make vet

      - name: Build
        run: make build

      # The opt-in end-to-end suite (`make test-e2e`, build tag `e2e`) needs
      # Docker + an Anthropic key and is intentionally excluded here.
      - name: Test
        run: make test
