  names:
    kind: ChannelConfig
    listKind: ChannelConfigList
    plural: channelconfigs
    shortNames:
    - chcfg
    singular: channelconfig
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ChannelConfig is the global (singleton, named "default") binding of chat
          channels to the agent templates they run. Keeping all bindings in one map
          guarantees each channel maps to exactly one template.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
